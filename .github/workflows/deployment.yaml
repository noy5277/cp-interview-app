name: Build and Push Image

on:
  push:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # if using OIDC to AWS, optional
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}       # e.g. 123456789012.dkr.ecr.eu-west-1.amazonaws.com
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}   # e.g. cp-interview-app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }} # or use access keys instead

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        run: |
          echo "IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (Dockerfile at repo root; context = .)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -f Dockerfile \
            . \
            --push
