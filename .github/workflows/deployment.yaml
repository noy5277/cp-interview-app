name: Build and Push to ECR

on:
  push:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2
      ECR_REGISTRY: 128955061512.dkr.ecr.us-east-2.amazonaws.com
      ECR_REPOSITORY: hello-world
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Export image variables
        run: |
          echo "IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -f Dockerfile \
            . \
            --push 

      - name: Clone deployment repo
        run: |
          git clone https://${{ secrets.DEPLOYMENT_REPO_TOKEN }}@github.com/noy5277/cp-interview-deployments.git
      
      - name: Edit docker tag
        run: |
          cd cp-interview-deployments
          sed -E 's/(image:.*:).*/\1${IMAGE_TAG}/' apps/stage/hello-app/deployment.yaml

      - name: Commit and push
        run: |
          cd cp-interview-deployments
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "New docker release" || echo "No changes"
          git push
